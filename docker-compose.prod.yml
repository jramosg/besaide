services:
  nginx:
    image: ${NGINX_IMAGE}
    ports:
      - '${APP_PORT:-80}:80'
    depends_on:
      node:
        condition: service_started
    healthcheck:
      test: ['CMD-SHELL', 'wget -q --spider http://localhost/ || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  node:
    image: ${NODE_IMAGE}
    environment:
      - HOST=0.0.0.0
      - PORT=1234
      - RESEND_API_KEY=${RESEND_API_KEY}
      - RESEND_TO_EMAIL=${RESEND_TO_EMAIL}
      - KEYSTATIC_GITHUB_CLIENT_ID=${KEYSTATIC_GITHUB_CLIENT_ID}
      - KEYSTATIC_GITHUB_CLIENT_SECRET=${KEYSTATIC_GITHUB_CLIENT_SECRET}
      - KEYSTATIC_SECRET=${KEYSTATIC_SECRET}
      - PUBLIC_KEYSTATIC_GITHUB_APP_SLUG=${PUBLIC_KEYSTATIC_GITHUB_APP_SLUG}
    expose:
      - '1234'
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "fetch(''http://localhost:1234/'').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"'
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
